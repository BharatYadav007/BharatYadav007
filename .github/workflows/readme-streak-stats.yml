name: Update streak stats

on:
  # allows to manually run the job at any time
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=transparent&disable_animations=false&hide_border=false&locale=en
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Push the generated SVG to the output branch
      - name: push streak.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: readme-streak-stats_output
          build_dir: profile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

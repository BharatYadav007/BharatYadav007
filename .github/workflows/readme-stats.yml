name: Update README cards

on:
  # allows to manually run the job at any time
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight


jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&hide_title=false&hide_rank=false&show_icons=true&include_all_commits=true&count_private=true&disable_animations=false&theme=transparent&hide_border=false&locale=en
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&hide_title=false&layout=compact&langs_count=6&theme=transparent&hide_border=false&locale=en
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Push the generated SVG to the output branch
      - name: push trophy.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: readme-stats_output
          build_dir: profile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
